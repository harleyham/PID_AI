model_name: segformer_ds3_ground
encryption_key: null
results_dir: ''
wandb:
  enable: false
  project: TAO Toolkit
  entity: ''
  group: ''
  tags:
  - training
  - tao-toolkit
  - ds3
  reinit: false
  sync_tensorboard: false
  save_code: false
  name: SegFormer DS3 ground experiment
  run_id: ''
model:
  backbone:
    type: fan_small_12_p4_hybrid
    feat_downsample: false
    pretrained_backbone_path: null
    freeze_backbone: false
  decode_head:
    in_channels:
    - 64
    - 128
    - 320
    - 512
    in_index:
    - 0
    - 1
    - 2
    - 3
    feature_strides:
    - 4
    - 8
    - 16
    - 32
    align_corners: false
    decoder_params:
      embed_dim: 768
dataset:
  segment:
    root_dir: /data/segformer_dataset_placeholder
    dataset: SFDataset
    num_classes: 4
    img_size: 256
    batch_size: 2
    workers: 4
    shuffle: true
    train_split: train
    validation_split: val
    test_split: val
    predict_split: test
    augmentation:
      random_flip:
        vflip_probability: 0.5
        hflip_probability: 0.5
        enable: true
      random_rotate:
        rotate_probability: 0.5
        angle_list:
        - 90.0
        - 180.0
        - 270.0
        enable: true
      random_color:
        brightness: 0.2
        contrast: 0.2
        saturation: 0.2
        hue: 0.1
        enable: true
        color_probability: 0.5
      with_scale_random_crop:
        scale_range:
        - 1.0
        - 1.2
        enable: true
      with_random_blur: true
      with_random_crop: true
      mean:
      - 0.5
      - 0.5
      - 0.5
      std:
      - 0.5
      - 0.5
      - 0.5
    label_transform: norm
    palette:
    - label_id: 0
      mapping_class: ground
      rgb:
      - 139
      - 69
      - 19
      seg_class: ground
    - label_id: 1
      mapping_class: vegetation
      rgb:
      - 34
      - 139
      - 34
      seg_class: vegetation
    - label_id: 2
      mapping_class: building
      rgb:
      - 128
      - 128
      - 128
      seg_class: building
    - label_id: 3
      mapping_class: background
      rgb:
      - 0
      - 0
      - 0
      seg_class: background
    quant_calibration_dataset:
      images_dir: /data/segformer_dataset_placeholder/images/train
train:
  num_gpus: 1
  gpu_ids:
  - 0
  num_nodes: 1
  seed: 1234
  cudnn:
    benchmark: false
    deterministic: true
  num_epochs: 10
  checkpoint_interval: 1
  checkpoint_interval_unit: epoch
  validation_interval: 1
  resume_training_checkpoint_path: null
  results_dir: null
  optim:
    monitor_name: val_loss
    optim: adamw
    lr: 6.0e-05
    policy: linear
    momentum: 0.9
    weight_decay: 0.01
  pretrained_model_path: null
  segment:
    loss: ce
    weights:
    - 1.0
    - 1.0
    - 1.0
    - 1.0
  tensorboard:
    enabled: false
    infrequent_logging_frequency: 2
  use_distributed_sampler: false
  sync_batchnorm: false
  checkpointer: null
  enable_lr_monitor: false
evaluate:
  num_gpus: 1
  gpu_ids:
  - 0
  num_nodes: 1
  checkpoint: ???
  trt_engine: null
  results_dir: null
  batch_size: 2
  vis_after_n_batches: 16
inference:
  num_gpus: 1
  gpu_ids:
  - 0
  num_nodes: 1
  checkpoint: ???
  trt_engine: null
  results_dir: null
  batch_size: 2
  vis_after_n_batches: 16
export:
  results_dir: null
  gpu_id: 0
  checkpoint: ???
  onnx_file: ???
  on_cpu: false
  input_channel: 3
  input_width: 544
  input_height: 544
  opset_version: 17
  batch_size: 2
  verbose: false
  format: onnx
  serialize_nvdsinfer: false
gen_trt_engine:
  results_dir: null
  gpu_id: 0
  onnx_file: ???
  trt_engine: ???
  timing_cache: null
  batch_size: 2
  verbose: false
  tensorrt:
    workspace_size: 1024
    min_batch_size: 1
    opt_batch_size: 1
    max_batch_size: 2
    layers_precision: []
    data_type: FP32
    calibration:
      cal_image_dir: /data/segformer_dataset_placeholder/images/train
      cal_cache_file: ???
      cal_batch_size: 1
      cal_batches: 1
quantize:
  backend: torchao
  mode: weight_only_ptq
  algorithm: minmax
  layers: []
  skip_names: []
  model_path: ''
  results_dir: ''
  backend_kwargs: {}
  device: cuda
